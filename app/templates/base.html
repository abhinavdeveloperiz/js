<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Project{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Custom Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blue: {
                            DEFAULT: '#0f172a',  /* deep blue */
                            light: '#1e3a8a',
                            soft: '#3b82f6',
                        },
                        green: {
                            DEFAULT: '#065f46',  /* deep green */
                            light: '#10b981',
                            soft: '#34d399',
                        }
                    },
                    backgroundImage: {
                        'gradient-blue': 'linear-gradient(135deg, #0f172a, #3b82f6)',
                        'gradient-green': 'linear-gradient(135deg, #065f46, #34d399)',
                        'gradient-mix': 'linear-gradient(135deg, #0f172a, #065f46, #3b82f6)',
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Static CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>


<style>
    html,
    body {
        scroll-behavior: smooth;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }
</style>

<body class="bg-gray-50 text-gray-800">


    <nav class="hidden md:block fixed top-0 w-full  z-50 backdrop-blur-lg bg-white/70 border-b border-gray-200">
        <div class="max-w-7xl  mx-auto px-6 py-3 flex justify-between items-center">

            <!-- Logo -->
            <div class="flex items-center">
                <img src="{% static 'logo/logo.png' %}" class="h-14" alt="logo">
            </div>

            <!-- Menu -->
            <div class="flex items-center space-x-8 font-medium text-gray-700">

                <a href="/" class="relative group {% if request.path == '/' %}text-green-light{% endif %}">
                    Home
                    <span
                        class="absolute left-0 -bottom-1 w-0 h-[2px] bg-green-light transition-all group-hover:w-full"></span>
                </a>

                <a href="/about/" class="relative group {% if 'about' in request.path %}text-green-light{% endif %}">
                    About
                    <span
                        class="absolute left-0 -bottom-1 w-0 h-[2px] bg-green-light transition-all group-hover:w-full"></span>
                </a>

                <a href="/products/"
                    class="relative group {% if 'products' in request.path %}text-green-light{% endif %}">
                    Products
                    <span
                        class="absolute left-0 -bottom-1 w-0 h-[2px] bg-green-light transition-all group-hover:w-full"></span>
                </a>

                <a href="/gallery/"
                    class="relative group {% if 'gallery' in request.path %}text-green-light{% endif %}">
                    Gallery
                    <span
                        class="absolute left-0 -bottom-1 w-0 h-[2px] bg-green-light transition-all group-hover:w-full"></span>
                </a>

                <a href="/contact/"
                    class="relative group {% if 'contact' in request.path %}text-green-light{% endif %}">
                    Contact
                    <span
                        class="absolute left-0 -bottom-1 w-0 h-[2px] bg-green-light transition-all group-hover:w-full"></span>
                </a>

            </div>

            <!-- CTA -->
            <div>
                <a href="/contact/"
                    class="bg-gradient-green text-white px-5 py-2 rounded-full shadow-md hover:scale-105 transition">
                    Get Quote
                </a>
            </div>

        </div>
    </nav>



    <div class="md:hidden fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b">

        <div class="relative flex items-center justify-center py-3">

            <!-- Logo Center -->
            <img src="{% static 'logo/logo.png' %}" class="h-12" alt="logo">

        </div>
    </div>


    <div class="md:hidden fixed bottom-4 left-1/2 transform -translate-x-1/2 z-50">

        <div
            class="bg-white/90 backdrop-blur-xl border shadow-2xl rounded-full px-6 py-3 flex justify-between items-center w-[95vw] max-w-md">

            <!-- Home -->
            <a href="/" class="flex flex-col items-center text-xs 
            {% if request.path == '/' %}text-green-light{% else %}text-gray-500{% endif %}">
                <i class="fas fa-home text-lg"></i>
                <span>Home</span>
            </a>

            <!-- About -->
            <a href="/about/" class="flex flex-col items-center text-xs 
            {% if 'about' in request.path %}text-green-light{% else %}text-gray-500{% endif %}">
                <i class="fas fa-user text-lg"></i>
                <span>About</span>
            </a>

            <!-- Center Button -->
            <a href="/products/" class="relative -mt-8">
                <div class="bg-gradient-mix text-white p-4 rounded-full shadow-xl border-4 border-white">
                    <i class="fas fa-store text-xl"></i>
                </div>
            </a>

            <!-- Gallery -->
            <a href="/gallery/" class="flex flex-col items-center text-xs 
            {% if 'gallery' in request.path %}text-green-light{% else %}text-gray-500{% endif %}">
                <i class="fas fa-image text-lg"></i>
                <span>Gallery</span>
            </a>

            <!-- Contact -->
            <a href="/contact/" class="flex flex-col items-center text-xs 
            {% if 'contact' in request.path %}text-green-light{% else %}text-gray-500{% endif %}">
                <i class="fas fa-envelope text-lg"></i>
                <span>Contact</span>
            </a>

        </div>
    </div>

    <!-- Main Content -->
    <main class="min-h-screen">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="relative bg-gradient-mix text-white overflow-hidden">

        <!-- Glow Effects -->
        <div class="absolute inset-0 opacity-20">
            <div class="absolute w-72 h-72 bg-green-soft rounded-full blur-3xl top-[-50px] left-[-50px]"></div>
            <div class="absolute w-72 h-72 bg-blue-soft rounded-full blur-3xl bottom-[-50px] right-[-50px]"></div>
        </div>

        <div class="relative max-w-7xl mx-auto px-6 py-10">

            <!-- TOP SECTION -->
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">

                <!-- LOGO + NAME -->
                <div class="flex items-center space-x-3">
                    <img src="{% static 'logo/logo.png' %}" class="h-12" alt="logo">
                </div>

                <!-- SOCIAL -->
                <div class="flex space-x-5 text-lg">
                    <a href="#" class="hover:text-green-soft transition"><i class="fab fa-facebook"></i></a>
                    <a href="#" class="hover:text-green-soft transition"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="hover:text-green-soft transition"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="hover:text-green-soft transition"><i class="fab fa-linkedin"></i></a>
                </div>

            </div>

            <!-- DIVIDER -->
            <div class="border-t border-white/20 my-6"></div>

            <!-- BOTTOM SECTION -->
            <div class="flex flex-col md:flex-row justify-between items-center text-sm text-gray-200 gap-3 mb-24">

                <!-- COPYRIGHT -->
                <p>
                    © {% now "Y" %} JS Trading Company FZE. All rights reserved.
                </p>

                <!-- CREDIT -->
                <p>
                    Designed & Developed by
                    <a href="https://www.inspirezesttechnologies.com/"
                        class="font-semibold text-white hover:text-green-soft transition " target="_blank">
                        InspireZest Technologies Pvt Ltd
                    </a>
                </p>

            </div>

        </div>
    </footer>

    <!-- AOS Script -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true,
        });
    </script>


</body>

</html>
