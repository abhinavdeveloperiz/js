{% extends 'base.html' %}
{% load static %}
{% block title %}Gallery - JS Trading Company FZE{% endblock %}

{% block content %}

<!-- ================= HERO ================= -->
<!-- ================= HERO ================= -->
<section class="relative text-white flex items-center justify-center 
                h-[35vh] md:h-[50vh] overflow-hidden">

    <!-- BACKGROUND IMAGE -->
    <div class="absolute inset-0 bg-cover bg-center bg-no-repeat md:bg-fixed"
        style="background-image: url('https://t3.ftcdn.net/jpg/09/15/41/58/360_F_915415879_q4SfbiqFrosg6BeijMNDnyKgYxVpuXC8.jpg');">
    </div>

    <!-- DARK OVERLAY -->
    <div class="absolute inset-0 bg-black/60"></div>

    <!-- GRADIENT OVERLAY -->
    <div class="absolute inset-0 bg-gradient-to-br from-blue/60 via-transparent to-green/60"></div>

    <div class="relative text-center px-6">
        <h1 class="text-2xl md:text-5xl font-bold mb-3 uppercase">
            Gallery
        </h1>
        <a href="/" class="text-gray-200 text-sm md:text-base max-w-xl mx-auto hover:underline transition">
            Home / <span class="text-green-light font-semibold">Gallery</span>
        </a>
    </div>

</section>






<!-- ================= GALLERY GRID ================= -->
<section class="bg-gray-50 py-16">
    <div class="max-w-7xl mx-auto px-6">

        <div class="grid sm:grid-cols-2 md:grid-cols-3 gap-6">

            <!-- ITEM -->
            <div class="gallery-item group relative overflow-hidden rounded-2xl cursor-pointer">
                <img src="https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3"
                    class="w-full h-64 object-cover group-hover:scale-110 transition duration-500">

                <!-- Overlay -->
                <div
                    class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                    <i class="fas fa-search-plus text-white text-2xl"></i>
                </div>
            </div>

            <!-- ITEM -->
            <div class="gallery-item group relative overflow-hidden rounded-2xl cursor-pointer">
                <img src="https://images.unsplash.com/photo-1559526324-593bc073d938"
                    class="w-full h-64 object-cover group-hover:scale-110 transition duration-500">
                <div
                    class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                    <i class="fas fa-search-plus text-white text-2xl"></i>
                </div>
            </div>

            <!-- ITEM -->
            <div class="gallery-item group relative overflow-hidden rounded-2xl cursor-pointer">
                <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d"
                    class="w-full h-64 object-cover group-hover:scale-110 transition duration-500">
                <div
                    class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                    <i class="fas fa-search-plus text-white text-2xl"></i>
                </div>
            </div>

            <!-- Duplicate more items as needed -->

        </div>

    </div>
</section>


<!-- ================= LIGHTBOX ================= -->
<div id="lightbox" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50">
    <span class="absolute top-6 right-6 text-white text-3xl cursor-pointer" onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img" class="max-h-[90%] max-w-[90%] rounded-xl shadow-2xl">
</div>


<!-- ================= SCRIPT ================= -->
<script>
    const items = document.querySelectorAll('.gallery-item');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    items.forEach(item => {
        item.addEventListener('click', () => {
            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');
            lightboxImg.src = item.querySelector('img').src;
        });
    });

    function closeLightbox() {
        lightbox.classList.add('hidden');
    }
</script>

{% endblock %}
